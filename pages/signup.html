<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up – LinguaLeap</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet"/>
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-icon">🦊</span>
      <span class="logo-text">LinguaLeap</span>
    </div>
    <h2>Create your account</h2>
    <p class="sub">Start your English learning journey today!</p>

    <div class="form-group">
      <label for="name">Your Name</label>
      <input type="text" id="name" placeholder="e.g. Priya Sharma" autocomplete="name"/>
    </div>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="you@example.com"/>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Min. 6 characters"/>
    </div>

    <div class="form-group">
      <label for="native-lang">Your Native Language</label>
      <select id="native-lang">
        <option value="">-- Select your language --</option>
        <option value="hi">🇮🇳 Hindi</option>
        <option value="es">🇪🇸 Spanish</option>
        <option value="fr">🇫🇷 French</option>
        <option value="de">🇩🇪 German</option>
        <option value="ja">🇯🇵 Japanese</option>
        <option value="ko">🇰🇷 Korean</option>
        <option value="zh">🇨🇳 Chinese (Mandarin)</option>
        <option value="ar">🇸🇦 Arabic</option>
        <option value="pt">🇧🇷 Portuguese</option>
        <option value="ru">🇷🇺 Russian</option>
        <option value="it">🇮🇹 Italian</option>
        <option value="tr">🇹🇷 Turkish</option>
        <option value="ta">🇮🇳 Tamil</option>
        <option value="te">🇮🇳 Telugu</option>
        <option value="bn">🇧🇩 Bengali</option>
        <option value="other">🌐 Other</option>
      </select>
    </div>

    <div class="form-group">
      <label for="level">Your English Level</label>
      <select id="level">
        <option value="">-- Select your level --</option>
        <option value="beginner">🌱 Beginner – Little to no English</option>
        <option value="elementary">📗 Elementary – Basic phrases</option>
        <option value="intermediate">📘 Intermediate – Can have conversations</option>
        <option value="advanced">📙 Advanced – Nearly fluent</option>
      </select>
    </div>

    <div class="form-group">
      <label for="daily-goal">Daily Goal</label>
      <select id="daily-goal">
        <option value="10">🐢 Casual – 10 XP / day</option>
        <option value="20" selected>⚡ Regular – 20 XP / day</option>
        <option value="30">🔥 Serious – 30 XP / day</option>
        <option value="50">💎 Intense – 50 XP / day</option>
      </select>
    </div>

    <button class="btn btn-primary btn-block" onclick="handleSignup()">Create Account 🚀</button>

    <div class="auth-switch">
      Already have an account? <a href="login.html">Log In</a>
    </div>
  </div>

  <script>
    function handleSignup() {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const lang = document.getElementById('native-lang').value;
      const level = document.getElementById('level').value;
      const goal = document.getElementById('daily-goal').value;

      if (!name || !email || !password || !lang || !level) {
        alert('Please fill in all fields!');
        return;
      }
      if (password.length < 6) {
        alert('Password must be at least 6 characters.');
        return;
      }

      const user = {
        name, email, lang, level, goal,
        xp: 0,
        streak: 0,
        lastLogin: new Date().toDateString(),
        completedLessons: [],
        badges: []
      };
      localStorage.setItem('ll_user', JSON.stringify(user));
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
